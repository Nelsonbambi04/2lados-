<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Dois Lados - Escritório de Arquitetura e Construção em Luanda, Angola. Projetos residenciais, comerciais, gestão de obras e design de interiores." />
    <meta name="keywords" content="arquitetura, construção, Luanda, Angola, projetos, design de interiores, fiscalização de obras" />
    <meta name="author" content="Dois Lados - Arquitetura e Construção" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="Dois Lados - Do Traço à Obra" />
    <meta property="og:description" content="Escritório de Arquitetura e Construção em Luanda, Angola" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_PT" />
    
    <title>Dois Lados - Projetos e Construção</title>

    <!-- Bootstrap + Fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    >
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  </head>
  <body>
    <div class="container py-4">
      <h1 class="mb-4">Dois Lados</h1>
      <!-- Secção Portfólio -->
      <section class="mb-5">
        <h2 class="h4">Portfólio</h2>
        <div id="portfolio-grid" class="row g-3"></div>
      </section>

      <!-- Secção Projetos -->
      <section class="mb-5">
        <h2 class="h4">Projetos</h2>
        <div id="projects-grid" class="row g-3"></div>
      </section>

      <!-- Formulário de Contacto -->
      <section class="mb-5">
        <h2 class="h4">Contacto</h2>
        <div id="contact-alert" class="alert d-none"></div>
        <form id="contact-form" class="row g-3">
          <div class="col-md-6">
            <label class="form-label" for="contact-name">Nome</label>
            <input class="form-control" id="contact-name" required>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="contact-email">Email</label>
            <input type="email" class="form-control" id="contact-email" required>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="contact-phone">Telefone</label>
            <input class="form-control" id="contact-phone">
          </div>
          <div class="col-md-6">
            <label class="form-label" for="contact-subject">Assunto</label>
            <input class="form-control" id="contact-subject">
          </div>
          <div class="col-12">
            <label class="form-label" for="contact-message">Mensagem</label>
            <textarea class="form-control" id="contact-message" rows="3" required></textarea>
          </div>
          <div class="col-12">
            <button class="btn btn-primary" type="submit">Enviar</button>
          </div>
        </form>
      </section>

      <!-- Formulário de Agendamento/Orçamento -->
      <section class="mb-5">
        <h2 class="h4">Agendar/Orçamento</h2>
        <div id="schedule-alert" class="alert d-none"></div>
        <form id="schedule-form" class="row g-3">
          <div class="col-md-6">
            <label class="form-label" for="schedule-name">Nome</label>
            <input class="form-control" id="schedule-name" required>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="schedule-email">Email</label>
            <input type="email" class="form-control" id="schedule-email" required>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="schedule-phone">Telefone</label>
            <input class="form-control" id="schedule-phone">
          </div>
          <div class="col-md-6">
            <label class="form-label" for="schedule-type">Tipo de Projeto</label>
            <input class="form-control" id="schedule-type">
          </div>
          <div class="col-md-6">
            <label class="form-label" for="schedule-date">Data Preferencial</label>
            <input type="date" class="form-control" id="schedule-date">
          </div>
          <div class="col-md-6">
            <label class="form-label" for="schedule-budget">Orçamento</label>
            <input class="form-control" id="schedule-budget">
          </div>
          <div class="col-12">
            <label class="form-label" for="schedule-notes">Notas</label>
            <textarea class="form-control" id="schedule-notes" rows="3"></textarea>
          </div>
          <div class="col-12">
            <button class="btn btn-primary" type="submit">Enviar</button>
          </div>
        </form>
      </section>
    </div>

    <script>
      window.API_BASE = 'http://127.0.0.1:5000';
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
